<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteGenie - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
<div class="app-container">

    <!-- ── Sidebar ──────────────────────────────────────────────── -->
    <div class="sidebar">
        <a href="/" class="sidebar-logo" title="NoteGenie">
            <i class="fas fa-pen-fancy"></i>
        </a>

        <a href="/dashboard" class="sidebar-icon active" data-tooltip="Dashboard" id="dashboardIcon">
            <i class="fas fa-th-large"></i>
        </a>
        <a href="#" class="sidebar-icon" data-tooltip="My Notes" id="notesIconBtn">
            <i class="fas fa-file-alt"></i>
        </a>
        <a href="#" class="sidebar-icon" data-tooltip="Favorites" id="favoritesIconBtn">
            <i class="fas fa-star"></i>
        </a>
        <a href="#" class="sidebar-icon" data-tooltip="Folders" id="foldersIconBtn">
            <i class="fas fa-folder"></i>
        </a>

        <div style="flex:1"></div>

        <!-- Theme toggle -->
        <button class="sidebar-icon" data-tooltip="Toggle Theme" id="themeToggleBtn" style="background:none;border:none;cursor:pointer;">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>

        <!-- Settings -->
        <a href="#" class="sidebar-icon" data-tooltip="Settings" id="settingsBtn">
            <i class="fas fa-cog"></i>
        </a>

        <a href="/" class="sidebar-icon" data-tooltip="Home" id="homeIcon">
            <i class="fas fa-home"></i>
        </a>
    </div>

    <!-- ── Main Content ──────────────────────────────────────────── -->
    <div class="main-content">
        <div class="top-bar">
            <div>
                <h1>Dashboard</h1>
                <p class="top-bar-sub">What are we studying today?</p>
            </div>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search notes...">
            </div>
        </div>

        <!-- Action Cards -->
        <div class="action-cards">
            <div class="action-card" id="audioCard">
                <div class="card-icon audio-icon"><i class="fas fa-microphone"></i></div>
                <div class="card-content"><h3>Audio</h3><p>MP3, WAV, M4A</p></div>
                <span class="card-tag">Transcribe</span>
                <input type="file" id="audioFileInput" accept=".mp3,.wav,.m4a,.ogg" hidden>
            </div>
            <div class="action-card" id="documentCard">
                <div class="card-icon doc-icon"><i class="fas fa-file-alt"></i></div>
                <div class="card-content"><h3>Document</h3><p>PDF, DOCX, Images</p></div>
                <span class="card-tag">Analyse</span>
                <input type="file" id="docFileInput" accept=".jpg,.jpeg,.png,.pdf,.docx,.txt,.pptx" hidden>
            </div>
            <div class="action-card" id="youtubeCard">
                <div class="card-icon yt-icon"><i class="fab fa-youtube"></i></div>
                <div class="card-content"><h3>YouTube</h3><p>Any video URL</p></div>
                <span class="card-tag">Generate</span>
            </div>
        </div>

        <!-- Tabs + New Folder -->
        <div class="tabs">
            <div class="tab-list">
                <span class="tab active" data-tab="my-notes">My Notes</span>
                <span class="tab" data-tab="shared">Shared</span>
                <span class="tab" data-tab="archived">Archived</span>
            </div>
            <button class="new-folder-btn" id="newFolderBtn">
                <i class="fas fa-plus"></i> New Folder
            </button>
        </div>

        <!-- Folders -->
        <div class="folders-section">
            <h3 class="folders-title"><i class="fas fa-folder"></i> Your Folders</h3>
            <div class="folders-grid" id="foldersGrid"></div>
        </div>

        <!-- Notes List -->
        <div class="notes-list" id="notesList"></div>
    </div>
</div>

<!-- ── Right Panel ───────────────────────────────────────────────── -->
<div class="rp-overlay" id="rightPanelOverlay"></div>
<div class="right-panel" id="rightPanel">

    <!-- Panel header -->
    <div class="rp-header">
        <div class="rp-tab-bar" id="rpTabBar"></div>
        <button class="rp-close-btn" id="rpCloseBtn"><i class="fas fa-times"></i></button>
    </div>

    <!-- Panel body (scrollable content) -->
    <div class="rp-body" id="rpTabContent">
        <div class="rp-empty">
            <i class="fas fa-layer-group"></i>
            <p>Open a file or YouTube link<br>to get started</p>
        </div>
    </div>
</div>

<!-- ── Settings Modal ────────────────────────────────────────────── -->
<div class="modal" id="settingsModal">
    <div class="modal-content" style="width:500px;max-width:95vw;">
        <div class="modal-header">
            <h3><i class="fas fa-cog" style="color:#f59e0b"></i> Settings</h3>
            <span class="close-modal">&times;</span>
        </div>

        <div class="settings-tabs">
            <button class="settings-tab active" data-stab="profile">Profile</button>
            <button class="settings-tab" data-stab="security">Security</button>
            <button class="settings-tab" data-stab="appearance">Appearance</button>
        </div>

        <!-- Profile tab -->
        <div class="settings-panel active" id="stab-profile">
            <div class="settings-field">
                <label>Username</label>
                <input type="text" id="settingsUsername" placeholder="Your username">
            </div>
            <div class="settings-field">
                <label>Email</label>
                <input type="email" id="settingsEmail" placeholder="your@email.com">
            </div>
            <button class="modal-btn create" id="saveProfileBtn" style="width:100%;justify-content:center;margin-top:0.5rem;">
                <i class="fas fa-save"></i> Save Profile
            </button>
        </div>

        <!-- Security tab -->
        <div class="settings-panel" id="stab-security">
            <div class="settings-field">
                <label>Current Password</label>
                <input type="password" id="currentPassword" placeholder="••••••••">
            </div>
            <div class="settings-field">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="••••••••">
            </div>
            <div class="settings-field">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <button class="modal-btn create" id="savePasswordBtn" style="width:100%;justify-content:center;margin-top:0.5rem;">
                <i class="fas fa-lock"></i> Update Password
            </button>
        </div>

        <!-- Appearance tab -->
        <div class="settings-panel" id="stab-appearance">
            <div class="settings-field">
                <label>Theme</label>
                <div class="theme-options">
                    <button class="theme-opt active" data-theme-opt="light">
                        <i class="fas fa-sun"></i> Light
                    </button>
                    <button class="theme-opt" data-theme-opt="dark">
                        <i class="fas fa-moon"></i> Dark
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ── Other Modals ──────────────────────────────────────────────── -->
<div class="modal" id="youtubeModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fab fa-youtube" style="color:#f59e0b"></i> YouTube Video</h3>
            <span class="close-modal">&times;</span>
        </div>
        <input type="text" class="modal-input" id="youtubeUrl" placeholder="Paste YouTube URL...">
        <div class="modal-actions">
            <button class="modal-btn cancel">Cancel</button>
            <button class="modal-btn create" id="processYoutubeBtn">
                <i class="fas fa-bolt"></i> Generate Notes
            </button>
        </div>
    </div>
</div>

<div class="modal" id="folderModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-folder" style="color:#f59e0b"></i> New Folder</h3>
            <span class="close-modal">&times;</span>
        </div>
        <input type="text" class="modal-input" id="folderName" placeholder="Folder name">
        <div class="modal-actions">
            <button class="modal-btn cancel">Cancel</button>
            <button class="modal-btn create" id="createFolderBtn">Create</button>
        </div>
    </div>
</div>

<div class="modal" id="moveModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-folder" style="color:#f59e0b"></i> Move to Folder</h3>
            <span class="close-modal">&times;</span>
        </div>
        <select class="modal-input" id="folderSelect"></select>
        <div class="modal-actions">
            <button class="modal-btn cancel">Cancel</button>
            <button class="modal-btn create" id="moveBtn">Move</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/static/js/right-panel.js"></script>
<script src="/static/js/dashboard.js"></script>
<script src="/static/js/upload.js"></script>
<script src="/static/js/features.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {

    // ── Theme ──────────────────────────────────────────────────────
    const savedTheme = localStorage.getItem('ng-theme') || 'light';
    setTheme(savedTheme);

    document.getElementById('themeToggleBtn')?.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme');
        setTheme(cur === 'dark' ? 'light' : 'dark');
    });

    function setTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('ng-theme', t);
        const icon = document.getElementById('themeIcon');
        if (icon) icon.className = t === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        document.querySelectorAll('[data-theme-opt]').forEach(b => {
            b.classList.toggle('active', b.dataset.themeOpt === t);
        });
    }

    document.querySelectorAll('[data-theme-opt]').forEach(btn => {
        btn.addEventListener('click', () => setTheme(btn.dataset.themeOpt));
    });

    // ── Sidebar navigation ─────────────────────────────────────────
    document.getElementById('notesIconBtn')?.addEventListener('click', e => {
        e.preventDefault();
        document.getElementById('notesList')?.scrollIntoView({ behavior: 'smooth' });
    });

    document.getElementById('foldersIconBtn')?.addEventListener('click', e => {
        e.preventDefault();
        document.querySelector('.folders-section')?.scrollIntoView({ behavior: 'smooth' });
    });

    document.getElementById('favoritesIconBtn')?.addEventListener('click', e => {
        e.preventDefault();
        Swal.fire({ icon: 'info', title: 'Favorites', text: 'Favorites feature coming soon!',
            background: 'var(--modal-bg)', color: 'var(--text-primary)', confirmButtonColor: '#f59e0b' });
    });

    document.getElementById('settingsBtn')?.addEventListener('click', e => {
        e.preventDefault();
        document.getElementById('settingsModal').classList.add('active');
    });

    // ── Settings modal tabs ────────────────────────────────────────
    document.querySelectorAll('.settings-tab').forEach(tab => {
        tab.addEventListener('click', function () {
            document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.settings-panel').forEach(p => p.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('stab-' + this.dataset.stab)?.classList.add('active');
        });
    });

    // ── Save profile (placeholder — wire to real API if available) ──
    document.getElementById('saveProfileBtn')?.addEventListener('click', async function () {
        const username = document.getElementById('settingsUsername').value.trim();
        const email    = document.getElementById('settingsEmail').value.trim();
        if (!username || !email) {
            Swal.fire({ icon: 'warning', title: 'Fill in all fields',
                background: 'var(--modal-bg)', color: 'var(--text-primary)', confirmButtonColor: '#f59e0b' });
            return;
        }
        Swal.fire({ icon: 'success', title: 'Profile saved!', timer: 1500, showConfirmButton: false,
            background: 'var(--modal-bg)', color: 'var(--text-primary)' });
    });

    // ── Save password (placeholder) ────────────────────────────────
    document.getElementById('savePasswordBtn')?.addEventListener('click', async function () {
        const np = document.getElementById('newPassword').value;
        const cp = document.getElementById('confirmPassword').value;
        if (!np || np !== cp) {
            Swal.fire({ icon: 'error', title: 'Passwords do not match',
                background: 'var(--modal-bg)', color: 'var(--text-primary)', confirmButtonColor: '#f59e0b' });
            return;
        }
        Swal.fire({ icon: 'success', title: 'Password updated!', timer: 1500, showConfirmButton: false,
            background: 'var(--modal-bg)', color: 'var(--text-primary)' });
    });

    // ── YouTube ────────────────────────────────────────────────────
    document.getElementById('processYoutubeBtn')?.addEventListener('click', processYouTubeVideo);

    // ── Modal close ────────────────────────────────────────────────
    document.querySelectorAll('.close-modal, .modal-btn.cancel').forEach(b => {
        b.addEventListener('click', () => document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')));
    });
    window.addEventListener('click', e => {
        document.querySelectorAll('.modal').forEach(m => { if (e.target === m) m.classList.remove('active'); });
    });
});

// ── YouTube processing (uses RightPanel) ──────────────────────────
async function processYouTubeVideo() {
    const url = document.getElementById('youtubeUrl')?.value?.trim();
    if (!url) {
        Swal.fire({ icon: 'warning', title: 'URL Required', text: 'Please enter a YouTube URL',
            background: 'var(--modal-bg)', color: 'var(--text-primary)', confirmButtonColor: '#f59e0b' });
        return;
    }

    document.getElementById('youtubeModal').classList.remove('active');

    // Open panel in loading state while we wait
    if (window.RightPanel) {
        const tabId = ++window._ytTabCounter || (window._ytTabCounter = 1);
        window.RightPanel.open();
    }

    Swal.fire({ title: 'Processing...', text: 'Fetching transcript and generating notes',
        allowOutsideClick: false, background: 'var(--modal-bg)', color: 'var(--text-primary)',
        didOpen: () => Swal.showLoading() });

    try {
        const fd = new FormData();
        fd.append('url', url);
        const r = await fetch('/api/v1/youtube/process', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` },
            body: fd
        });
        const result = await r.json();
        Swal.close();

        if (r.ok && result.success) {
            window.RightPanel.openYoutubeTab(result.notes);
            document.getElementById('youtubeUrl').value = '';
        } else {
            window.RightPanel.close();
            Swal.fire({ icon: 'error', title: 'Error', text: result.detail || 'Failed to process video',
                background: 'var(--modal-bg)', color: 'var(--text-primary)', confirmButtonColor: '#f59e0b' });
        }
    } catch (e) {
        Swal.close();
        window.RightPanel?.close();
        Swal.fire({ icon: 'error', title: 'Network Error', text: e.message,
            background: 'var(--modal-bg)', color: 'var(--text-primary)', confirmButtonColor: '#f59e0b' });
    }
}
</script>
</body>
</html>
