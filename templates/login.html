<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteGenie - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #fffbeb, #ffffff);
            min-height: 100vh;
            color: #1e293b;
        }

        /* Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4rem;
            background: white;
            border-bottom: 1px solid #fde68a;
        }

        /* Notebook-Style Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 600;
            text-decoration: none;
        }

        .notebook-logo {
            position: relative;
            width: 45px;
            height: 45px;
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
            border-radius: 8px 8px 12px 12px;
            box-shadow: 0 10px 15px -5px rgba(245, 158, 11, 0.3);
            transform: rotate(-2deg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .notebook-logo::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 5px;
            bottom: 5px;
            width: 4px;
            background: linear-gradient(to bottom, #ffffff 20%, transparent 20%);
            background-size: 4px 8px;
            border-radius: 2px;
            opacity: 0.7;
        }

        .notebook-logo i {
            color: white;
            font-size: 1.4rem;
            position: relative;
            z-index: 2;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
            transform: rotate(2deg);
        }

        .logo-text {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
        }

        .nav-links a {
            text-decoration: none;
            color: #475569;
            font-weight: 500;
            margin-left: 2rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #f59e0b;
        }

        /* Auth Container */
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
            padding: 2.5rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(245, 158, 11, 0.25);
            border: 1px solid #fde68a;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 2rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: #64748b;
        }

        .auth-header p a {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-header p a:hover {
            text-decoration: underline;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: #fffbeb;
            padding: 0.5rem;
            border-radius: 100px;
            border: 1px solid #fde68a;
        }

        .auth-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: all 0.3s;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.3);
        }

        /* Forms */
        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #475569;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group label i {
            color: #f59e0b;
            margin-right: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #fde68a;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #fffbeb;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.3);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.4);
        }

        .auth-btn i {
            margin-right: 0.5rem;
        }

        .message {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            font-weight: 500;
        }

        .message.error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
            display: block;
        }

        .message.success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #64748b;
        }

        .footer a {
            color: #f59e0b;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 1rem 2rem;
            }
            
            .auth-container {
                margin: 2rem 1rem;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">
            <div class="notebook-logo">
                <i class="fas fa-pen-fancy"></i>
            </div>
            <span class="logo-text">NoteGenie</span>
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/#features">Features</a>
            <a href="/login">Login</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-header">
            <h2>Welcome Back! 👋</h2>
            <p>Your notes are waiting for you</p>
        </div>

        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchTab('login')">Login</div>
            <div class="auth-tab" onclick="switchTab('register')">Register</div>
        </div>

        <div id="message" class="message"></div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username or Email</label>
                <input type="text" id="loginUsername" placeholder="Enter your username or email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="auth-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="regUsername" placeholder="Choose a username" minlength="3" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="regEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-id-card"></i> Full Name</label>
                <input type="text" id="regFullName" placeholder="Enter your full name (optional)">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="regPassword" placeholder="Create a password" minlength="6" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirm Password</label>
                <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="auth-btn">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>

        <div class="footer">
            <p>By continuing, you agree to our <a href="/terms">Terms</a> and <a href="/privacy">Privacy Policy</a></p>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            // Update tab styling
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.auth-tab[onclick="switchTab(\'login\')"]').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
                document.getElementById('registerForm').classList.remove('active');
            } else {
                document.querySelector('.auth-tab[onclick="switchTab(\'register\')"]').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
                document.getElementById('loginForm').classList.remove('active');
            }
            // Clear any messages
            document.getElementById('message').style.display = 'none';
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store tokens
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);
                    
                    showMessage('success', 'Login successful! Redirecting...');
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showMessage('error', data.detail || 'Login failed');
                }
            } catch (error) {
                showMessage('error', 'Network error. Please try again.');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const fullName = document.getElementById('regFullName').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            if (password !== confirmPassword) {
                showMessage('error', 'Passwords do not match');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        full_name: fullName
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store tokens
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);
                    
                    showMessage('success', 'Registration successful! Redirecting...');
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showMessage('error', data.detail || 'Registration failed');
                }
            } catch (error) {
                showMessage('error', 'Network error. Please try again.');
            }
        }

        function showMessage(type, message) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
        }
    </script>
</body>
</html>
